<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <title>文件传输助手</title>

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="文件传输助手">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#ededed" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)">
  <meta name="description" content="跨设备文件与消息传输助手">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/ios/180.png">

  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/messages.css">
  <link rel="stylesheet" href="./css/input.css">
  <link rel="stylesheet" href="./css/modals.css">
  <link rel="stylesheet" href="./css/mobile.css">

  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js" defer></script>
</head>
<body>
  <div class="app" id="app">
    <header class="app-nav" role="banner">
      <div class="app-nav-left">
        <span class="nav-status-dot" id="navStatusDot" title="连接状态"></span>
      </div>
      <h1 class="app-nav-title" id="navTitle">文件传输助手</h1>
      <div class="app-nav-right">
        <button type="button" class="icon-btn" id="searchNavBtn" aria-label="搜索" title="搜索">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
        <button type="button" class="icon-btn" id="moreNavBtn" aria-label="更多" title="更多">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>
      </div>
    </header>

    <div class="connection-bar" id="connectionBar" role="status" aria-live="polite"></div>
    <div class="toast-host" id="toastHost" aria-live="assertive"></div>

    <main class="app-main">
      <div class="chat-container">
        <div class="message-list" id="messageList" role="log" aria-label="消息列表" aria-relevant="additions"></div>

        <div class="input-container" id="inputContainer">
          <div class="ai-mode-bar" id="aiModeBar">
            <span>🤖 AI 助手模式已开启</span>
            <button type="button" id="aiModeCloseBtn">关闭</button>
          </div>

          <div class="upload-status" id="uploadStatus" role="status">
            <div class="spinner" aria-hidden="true"></div>
            <span id="uploadStatusText">正在上传...</span>
            <div class="upload-progress">
              <div class="upload-progress-bar" id="progressBar"></div>
            </div>
          </div>

          <form class="message-form" id="messageForm" autocomplete="off">
            <input type="file" id="fileInput" multiple hidden aria-hidden="true">
            <input type="file" id="imageInput" accept="image/*" multiple hidden aria-hidden="true">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden aria-hidden="true">

            <button type="button" class="tool-btn" id="emojiButton" title="表情" aria-label="表情" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
            </button>

            <div class="input-field-wrap">
              <textarea
                id="messageText"
                class="input-field"
                rows="1"
                placeholder="发送消息..."
                enterkeyhint="send"
                aria-label="消息输入框"
              ></textarea>
            </div>

            <button type="button" class="plus-btn" id="functionButton" aria-label="更多功能" aria-expanded="false" title="更多功能">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>

            <button type="submit" class="send-btn" id="sendButton" aria-label="发送">发送</button>
          </form>

          <!-- 微信式内嵌面板：表情 / 功能 -->
          <div class="panel-dock" id="panelDock" hidden>
            <div class="emoji-panel" id="emojiPanel" hidden>
              <div class="emoji-tabs" id="emojiTabs" role="tablist"></div>
              <div class="emoji-scroll" id="emojiScroll"></div>
            </div>
            <div class="plus-panel" id="plusPanel" hidden>
              <div class="function-grid" id="functionGrid"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 脚本：核心 → 业务 → 入口 -->
  <script src="./js/config.js"></script>
  <script src="./js/core/eventBus.js"></script>
  <script src="./js/core/emojiData.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/ui/messageRenderer.js"></script>
  <script src="./js/ui/markdownHandler.js"></script>
  <script src="./js/ui/imageLoader.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/fileUpload.js"></script>
  <script src="./js/realtime.js"></script>
  <script src="./js/messageHandler.js"></script>
  <script src="./js/pwa.js"></script>
  <script src="./js/components/emojiPanel.js"></script>
  <script src="./js/components/functionMenu.js"></script>
  <script src="./js/components/functionButton.js"></script>
  <script src="./js/ai/aiAPI.js"></script>
  <script src="./js/ai/aiUI.js"></script>
  <script src="./js/ai/aiHandler.js"></script>
  <script src="./js/imageGen/imageGenAPI.js"></script>
  <script src="./js/imageGen/imageGenUI.js"></script>
  <script src="./js/imageGen/imageGenHandler.js"></script>
  <script src="./js/search/searchAPI.js"></script>
  <script src="./js/search/searchUI.js"></script>
  <script src="./js/search/searchHandler.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
